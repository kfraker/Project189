<!DOCTYPE html>
<html>
<head>
    <title>Project 189</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="miami-left"></div>
<div class="miami-right"></div>

<div class="container">

    <h1>Project 189</h1>

    <div class="plates">

        <!-- Starting Weight -->
        <div class="plate" id="start-plate" role="button" tabindex="0" aria-label="Edit starting weight">
            <img class="plate-img" src="{{ url_for('static', filename='weightplate.png') }}" alt="">
            <svg class="plate-text-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!--
                        Top arc  r=34: baseline sits at r=34, glyphs extend OUTWARD → visual band 34–42
                        Bot arc  r=42: baseline sits at r=42, glyphs extend INWARD  → visual band 34–42
                        Both bands identical → same ring.
                    -->
                    <path id="t1" d="M 18,50 A 32,32 0 0,1 82,50"/>
                    <path id="b1" d="M 13,50 A 37,37 0 0,0 87,50"/>
                </defs>
                <text font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="5.5" fill="#f2f2f2" letter-spacing="0.5" text-anchor="middle">
                    <textPath href="#t1" startOffset="50%">STARTING</textPath>
                </text>
                <text font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="5.5" fill="#f2f2f2" letter-spacing="0.5" text-anchor="middle">
                    <textPath href="#b1" startOffset="50%">WEIGHT</textPath>
                </text>
            </svg>
            <div class="plate-lbs">
                <div class="plate-num" id="start-lbs-num">238</div>
                <div class="plate-unit">lbs</div>
            </div>
            <div class="plate-kg">
                <div class="plate-num" id="start-kg-num">107.9</div>
                <div class="plate-unit">kgs</div>
            </div>
        </div>

        <!-- Current Weight -->
        <div class="plate" id="current-plate" role="button" tabindex="0" aria-label="Edit current weight">
            <img class="plate-img" src="{{ url_for('static', filename='weightplate.png') }}" alt="">
            <svg class="plate-text-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <path id="t2" d="M 18,50 A 32,32 0 0,1 82,50"/>
                    <path id="b2" d="M 13,50 A 37,37 0 0,0 87,50"/>
                </defs>
                <text font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="5.5" fill="#f2f2f2" letter-spacing="0.5" text-anchor="middle">
                    <textPath href="#t2" startOffset="50%">CURRENT</textPath>
                </text>
                <text font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="5.5" fill="#f2f2f2" letter-spacing="0.5" text-anchor="middle">
                    <textPath href="#b2" startOffset="50%">WEIGHT</textPath>
                </text>
            </svg>
            <div class="plate-lbs">
                <div class="plate-num" id="current-lbs-num">226.2</div>
                <div class="plate-unit">lbs</div>
            </div>
            <div class="plate-kg">
                <div class="plate-num" id="current-kg-num">102.6</div>
                <div class="plate-unit">kgs</div>
            </div>
        </div>

        <!-- Lost Weight (auto-computed: starting - current) -->
        <div class="plate">
            <img class="plate-img" src="{{ url_for('static', filename='weightplate.png') }}" alt="">
            <svg class="plate-text-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <path id="t3" d="M 18,50 A 32,32 0 0,1 82,50"/>
                    <path id="b3" d="M 13,50 A 37,37 0 0,0 87,50"/>
                </defs>
                <text font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="5.5" fill="#f2f2f2" letter-spacing="0.5" text-anchor="middle">
                    <textPath href="#t3" startOffset="50%">LOST</textPath>
                </text>
                <text font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="5.5" fill="#f2f2f2" letter-spacing="0.5" text-anchor="middle">
                    <textPath href="#b3" startOffset="50%">WEIGHT</textPath>
                </text>
            </svg>
            <div class="plate-lbs">
                <div class="plate-num" id="lost-lbs-num">11.8</div>
                <div class="plate-unit">lbs</div>
            </div>
            <div class="plate-kg">
                <div class="plate-num" id="lost-kg-num">5.4</div>
                <div class="plate-unit">kgs</div>
            </div>
        </div>

        <!-- Goal Weight -->
        <div class="plate" id="goal-plate" role="button" tabindex="0" aria-label="Edit goal weight">
            <img class="plate-img" src="{{ url_for('static', filename='weightplate.png') }}" alt="">
            <svg class="plate-text-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <path id="t4" d="M 18,50 A 32,32 0 0,1 82,50"/>
                    <path id="b4" d="M 13,50 A 37,37 0 0,0 87,50"/>
                </defs>
                <text font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="5.5" fill="#f2f2f2" letter-spacing="0.5" text-anchor="middle">
                    <textPath href="#t4" startOffset="50%">GOAL</textPath>
                </text>
                <text font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="5.5" fill="#f2f2f2" letter-spacing="0.5" text-anchor="middle">
                    <textPath href="#b4" startOffset="50%">WEIGHT</textPath>
                </text>
            </svg>
            <div class="plate-lbs">
                <div class="plate-num" id="goal-lbs-num">189</div>
                <div class="plate-unit">lbs</div>
            </div>
            <div class="plate-kg">
                <div class="plate-num" id="goal-kg-num">85.7</div>
                <div class="plate-unit">kgs</div>
            </div>
        </div>

    </div>

</div>

<!-- Goal Weight Modal -->
<div id="goal-modal" class="modal-overlay" hidden>
    <div class="modal-card">
        <div id="goal-screen-input">
            <h2 class="modal-title">Goal Weight</h2>
            <label class="modal-label" for="goal-input">New goal (lbs)</label>
            <div class="modal-input-row">
                <input type="number" class="weight-input" id="goal-input" min="50" max="999" step="0.1" placeholder="189">
                <span class="modal-unit-tag">lbs</span>
                <div class="goal-stepper">
                    <button type="button" class="stepper-btn stepper-up" id="goal-step-up" aria-label="Increase goal weight"></button>
                    <button type="button" class="stepper-btn stepper-down" id="goal-step-down" aria-label="Decrease goal weight"></button>
                </div>
            </div>
            <div class="modal-kg-preview" id="goal-kg-preview"></div>
            <div class="modal-actions">
                <button class="modal-btn modal-cancel" id="goal-cancel">Cancel</button>
                <button class="modal-btn modal-save" id="goal-save">Save</button>
            </div>
        </div>
        <div id="goal-screen-confirm" hidden>
            <h2 class="modal-title">Confirm Overwrite</h2>
            <p id="goal-overwrite-message" class="overwrite-message"></p>
            <div class="modal-actions">
                <button class="modal-btn modal-cancel" id="goal-overwrite-cancel">Cancel</button>
                <button class="modal-btn modal-save" id="goal-overwrite-confirm">Overwrite</button>
            </div>
        </div>
    </div>
</div>

<!-- Current Weight Modal (two-screen card) -->
<div id="current-modal" class="modal-overlay" hidden>
    <div class="modal-card">

        <!-- Screen 1: weight input -->
        <div id="current-screen-input">
            <h2 class="modal-title">Current Weight</h2>
            <label class="modal-label" for="current-input">New current weight (lbs)</label>
            <div class="modal-input-row">
                <input type="number" class="weight-input" id="current-input" min="50" max="999" step="0.1" placeholder="226.2">
                <span class="modal-unit-tag">lbs</span>
                <div class="goal-stepper">
                    <button type="button" class="stepper-btn stepper-up" id="current-step-up" aria-label="Increase current weight"></button>
                    <button type="button" class="stepper-btn stepper-down" id="current-step-down" aria-label="Decrease current weight"></button>
                </div>
            </div>
            <div class="modal-kg-preview" id="current-kg-preview"></div>
            <div class="modal-actions">
                <button class="modal-btn modal-cancel" id="current-cancel">Cancel</button>
                <button class="modal-btn modal-save" id="current-save">Save</button>
            </div>
        </div>

        <!-- Screen 2: overwrite confirmation -->
        <div id="current-screen-confirm" hidden>
            <h2 class="modal-title">Confirm Overwrite</h2>
            <p id="current-overwrite-message" class="overwrite-message"></p>
            <div class="modal-actions">
                <button class="modal-btn modal-cancel" id="current-overwrite-cancel">Cancel</button>
                <button class="modal-btn modal-save" id="current-overwrite-confirm">Overwrite</button>
            </div>
        </div>

    </div>
</div>

<!-- Starting Weight Modal -->
<div id="start-modal" class="modal-overlay" hidden>
    <div class="modal-card">
        <div id="start-screen-input">
            <h2 class="modal-title">Starting Weight</h2>
            <label class="modal-label" for="start-input">New starting weight (lbs)</label>
            <div class="modal-input-row">
                <input type="number" class="weight-input" id="start-input" min="50" max="999" step="0.1" placeholder="238">
                <span class="modal-unit-tag">lbs</span>
                <div class="goal-stepper">
                    <button type="button" class="stepper-btn stepper-up" id="start-step-up" aria-label="Increase starting weight"></button>
                    <button type="button" class="stepper-btn stepper-down" id="start-step-down" aria-label="Decrease starting weight"></button>
                </div>
            </div>
            <div class="modal-kg-preview" id="start-kg-preview"></div>
            <div class="modal-actions">
                <button class="modal-btn modal-cancel" id="start-cancel">Cancel</button>
                <button class="modal-btn modal-save" id="start-save">Save</button>
            </div>
        </div>
        <div id="start-screen-confirm" hidden>
            <h2 class="modal-title">Confirm Overwrite</h2>
            <p id="start-overwrite-message" class="overwrite-message"></p>
            <div class="modal-actions">
                <button class="modal-btn modal-cancel" id="start-overwrite-cancel">Cancel</button>
                <button class="modal-btn modal-save" id="start-overwrite-confirm">Overwrite</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function () {
        const left  = document.querySelector('.miami-left');
        const right = document.querySelector('.miami-right');

        function update() {
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const progress  = maxScroll > 0 ? Math.min(window.scrollY / maxScroll, 1) : 0;
            const scale = 1 - progress * 0.25;
            const t = 'scale(' + scale + ')';
            left.style.transform  = t;
            right.style.transform = t;
        }

        window.addEventListener('scroll', update, { passive: true });
        update();
    })();

    /* ── Helpers ── */
    function getTodayISO() {
        const d = new Date();
        return d.getFullYear() + '-' +
            String(d.getMonth() + 1).padStart(2, '0') + '-' +
            String(d.getDate()).padStart(2, '0');
    }

    function formatDateDisplay(isoDate) {
        const [y, m, d] = isoDate.split('-').map(Number);
        return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function fmtLbs(n) { return n === Math.round(n) ? Math.round(n) : parseFloat(n.toFixed(1)); }

    /* ── Recompute Lost Weight whenever Starting or Current changes ── */
    function updateLostWeight() {
        const startLbs   = parseFloat(document.getElementById('start-lbs-num').textContent)   || 0;
        const currentLbs = parseFloat(document.getElementById('current-lbs-num').textContent) || 0;
        const diff = Math.max(0, Math.round((startLbs - currentLbs) * 10) / 10);
        document.getElementById('lost-lbs-num').textContent = fmtLbs(diff);
        document.getElementById('lost-kg-num').textContent  = (diff / 2.2046).toFixed(1);
    }

    /* ── Weight edit modal — shared by all editable weight cards ──
       apiSave(lbs, overwrite) must return:
         true             — saved, proceed with DOM update + close
         false            — error, do nothing
         'conflict:MSG'   — show confirm screen with MSG, await user choice  */
    function setupWeightModal(cfg) {
        const modal   = document.getElementById(cfg.modal);
        const input   = document.getElementById(cfg.input);
        const preview = document.getElementById(cfg.preview);
        const lbsNum  = document.getElementById(cfg.lbsNum);
        const kgNum   = document.getElementById(cfg.kgNum);

        function toKg(lbs) { return (lbs / 2.2046).toFixed(1); }
        function updatePreview() {
            const v = parseFloat(input.value);
            preview.textContent = (!isNaN(v) && v > 0) ? '= ' + toKg(v) + ' kgs' : '';
        }

        function close() { modal.hidden = true; }

        function commitSave(v) {
            lbsNum.textContent = fmtLbs(v);
            kgNum.textContent  = toKg(v);
            close();
            if (cfg.onSave) cfg.onSave();
        }

        function showConfirmScreen(v, message) {
            document.getElementById(cfg.confirmMsgId).textContent = message;
            document.getElementById(cfg.screens[0]).hidden = true;
            document.getElementById(cfg.screens[1]).hidden = false;
            document.getElementById(cfg.confirmBtnId).onclick = () => doSave(v, true);
        }

        async function doSave(v, overwrite) {
            if (cfg.apiSave) {
                const result = await cfg.apiSave(v, overwrite);
                if (typeof result === 'string' && result.startsWith('conflict:')) {
                    showConfirmScreen(v, result.slice('conflict:'.length));
                    return;
                }
                if (!result) return;
            }
            commitSave(v);
        }

        function open() {
            if (cfg.screens) {
                document.getElementById(cfg.screens[0]).hidden = false;
                document.getElementById(cfg.screens[1]).hidden = true;
            }
            input.value = lbsNum.textContent;
            updatePreview();
            modal.hidden = false;
            setTimeout(() => { input.focus(); input.select(); }, 50);
        }

        function step(amount) {
            const cur = parseFloat(input.value) || 0;
            let next = Math.round((cur + amount) * 10) / 10;
            next = Math.min(parseFloat(input.max), Math.max(parseFloat(input.min), next));
            input.value = next;
            updatePreview();
        }

        document.getElementById(cfg.plate).addEventListener('click', open);
        document.getElementById(cfg.plate).addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') open(); });
        document.getElementById(cfg.cancel).addEventListener('click', close);
        document.getElementById(cfg.save).addEventListener('click', () => { const v = parseFloat(input.value); if (!isNaN(v) && v > 0) doSave(v, false); });
        document.getElementById(cfg.stepUp).addEventListener('click', () => step(1));
        document.getElementById(cfg.stepDown).addEventListener('click', () => step(-1));
        modal.addEventListener('click', e => { if (e.target === modal) close(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
        input.addEventListener('keydown', e => { if (e.key === 'Enter') { const v = parseFloat(input.value); if (!isNaN(v) && v > 0) doSave(v, false); } });
        input.addEventListener('input', updatePreview);
        if (cfg.screens) {
            document.getElementById(cfg.confirmCancelId).addEventListener('click', close);
        }
    }

    setupWeightModal({
        plate: 'goal-plate', modal: 'goal-modal', input: 'goal-input', preview: 'goal-kg-preview',
        lbsNum: 'goal-lbs-num', kgNum: 'goal-kg-num', cancel: 'goal-cancel', save: 'goal-save',
        stepUp: 'goal-step-up', stepDown: 'goal-step-down',
        screens: ['goal-screen-input', 'goal-screen-confirm'],
        confirmMsgId: 'goal-overwrite-message', confirmBtnId: 'goal-overwrite-confirm', confirmCancelId: 'goal-overwrite-cancel',
        apiSave: async (lbs, overwrite) => {
            const res  = await fetch('/api/setting', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: 'goal_weight', value_lbs: lbs, overwrite }) });
            const data = await res.json();
            if (data.success)  return true;
            if (data.conflict) return 'conflict:Are you sure you want to update your goal weight?';
            return false;
        }
    });

    setupWeightModal({
        plate: 'start-plate', modal: 'start-modal', input: 'start-input', preview: 'start-kg-preview',
        lbsNum: 'start-lbs-num', kgNum: 'start-kg-num', cancel: 'start-cancel', save: 'start-save',
        stepUp: 'start-step-up', stepDown: 'start-step-down',
        screens: ['start-screen-input', 'start-screen-confirm'],
        confirmMsgId: 'start-overwrite-message', confirmBtnId: 'start-overwrite-confirm', confirmCancelId: 'start-overwrite-cancel',
        onSave: updateLostWeight,
        apiSave: async (lbs, overwrite) => {
            const res  = await fetch('/api/setting', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: 'starting_weight', value_lbs: lbs, overwrite }) });
            const data = await res.json();
            if (data.success)  return true;
            if (data.conflict) return 'conflict:Are you sure you want to update your starting weight?';
            return false;
        }
    });

    setupWeightModal({
        plate: 'current-plate', modal: 'current-modal', input: 'current-input', preview: 'current-kg-preview',
        lbsNum: 'current-lbs-num', kgNum: 'current-kg-num', cancel: 'current-cancel', save: 'current-save',
        stepUp: 'current-step-up', stepDown: 'current-step-down',
        screens: ['current-screen-input', 'current-screen-confirm'],
        confirmMsgId: 'current-overwrite-message', confirmBtnId: 'current-overwrite-confirm', confirmCancelId: 'current-overwrite-cancel',
        onSave: updateLostWeight,
        apiSave: async (lbs, overwrite) => {
            const today = getTodayISO();
            const res   = await fetch('/api/weight', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ weight_lbs: lbs, date: today, overwrite }) });
            const data  = await res.json();
            if (data.success)  return true;
            if (data.conflict) return 'conflict:Are you sure you want to overwrite your weight for ' + formatDateDisplay(today) + '?';
            return false;
        }
    });

    /* Custom cursor: scale pointer.png to 48px tall, strip white background,
       set hotspot at fingertip (upper-left of image). */
    (function () {
        const img = new Image();
        img.onload = function () {
            const h = 48;
            const scale = h / img.height;
            const w = Math.round(img.width * scale);
            const canvas = document.createElement('canvas');
            canvas.width  = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);

            const id = ctx.getImageData(0, 0, w, h);
            const d  = id.data;
            for (let i = 0; i < d.length; i += 4) {
                if (d[i] > 230 && d[i + 1] > 230 && d[i + 2] > 230) d[i + 3] = 0;
            }
            ctx.putImageData(id, 0, 0);

            const hotX = Math.round(280 * scale);
            const hotY = Math.round(60 * scale);
            const url  = canvas.toDataURL();
            document.body.style.cursor = `url(${url}) ${hotX} ${hotY}, default`;
        };
        img.src = '/static/pointer.png';
    })();
</script>
</body>
</html>
