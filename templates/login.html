<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sweat Equity — Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; }
        :root { color-scheme: dark; }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            background: url('/static/mainbackground.png') center / cover no-repeat;
            background-color: rgb(8, 0, 18);
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(8, 0, 18, 0.72);
            z-index: 0;
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: #0d0020;
            border: 1px solid rgba(255, 45, 120, 0.4);
            border-radius: 20px;
            padding: 40px 32px 32px;
            width: min(360px, 90vw);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            box-shadow: 0 0 30px rgba(255, 45, 120, 0.2), 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: loginPop 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes loginPop {
            from { opacity: 0; transform: scale(0.88); }
            to   { opacity: 1; transform: scale(1); }
        }

        .login-title {
            font-family: 'Pacifico', cursive;
            font-size: 34px;
            line-height: 1.4;
            color: #ffe0ee;
            margin: 0;
            text-align: center;
            text-shadow: 0 0 10px #ff80aa, 0 0 24px #ff2d78;
        }
        .login-subtitle {
            margin: 8px 0 0;
            color: rgba(255, 255, 255, 0.55);
            font-size: 14px;
            text-align: center;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 45, 120, 0.08);
            border: 1px solid rgba(255, 45, 120, 0.25);
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.18s;
        }
        .google-btn:hover {
            background: rgba(255, 45, 120, 0.2);
            border-color: rgba(255, 45, 120, 0.6);
            transform: translateX(4px);
            box-shadow: 0 4px 16px rgba(255, 45, 120, 0.3);
        }
        .google-btn svg { flex-shrink: 0; }
    </style>
</head>
<body>

<div class="login-card" role="dialog" aria-labelledby="login-title">
    <div>
        <h1 class="login-title" id="login-title">Sweat Equity</h1>
        <p class="login-subtitle">Sign in to track your weigh-ins &amp; workouts</p>
    </div>

    <a class="google-btn" href="{{ url_for('auth_google') }}">
        <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12
                c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24
                c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
            <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039
                l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
            <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36
                c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
            <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571
                c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
        </svg>
        <span>Sign in with Google</span>
    </a>
</div>

</body>
</html>
