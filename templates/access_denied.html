<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sweat Equity — Access Denied</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; }
        :root { color-scheme: dark; }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            background: url('/static/mainbackground.png') center / cover no-repeat;
            background-color: rgb(8, 0, 18);
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(8, 0, 18, 0.72);
            z-index: 0;
        }

        .denied-card {
            position: relative;
            z-index: 1;
            background: #0d0020;
            border: 1px solid rgba(255, 45, 120, 0.4);
            border-radius: 20px;
            padding: 40px 32px 32px;
            width: min(380px, 90vw);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 45, 120, 0.2), 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .denied-title {
            font-family: 'Pacifico', cursive;
            font-size: 30px;
            color: #ffe0ee;
            margin: 0;
            text-shadow: 0 0 10px #ff80aa, 0 0 24px #ff2d78;
        }
        .denied-body {
            color: rgba(255, 255, 255, 0.75);
            font-size: 15px;
            line-height: 1.5;
            margin: 0;
        }
        .denied-contact {
            color: #ff80aa;
        }
    </style>
</head>
<body>

<div class="denied-card" role="alert">
    <h1 class="denied-title">Access Denied</h1>
    <p class="denied-body">
        This Google account isn't on the guest list for Sweat Equity yet.
        Ask the owner to add your email if you think this is a mistake:
        <br>
        <a class="denied-contact" href="mailto:{{ owner_email }}">{{ owner_email }}</a>
    </p>
</div>

</body>
</html>
